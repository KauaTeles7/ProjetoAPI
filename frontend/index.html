<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚽ Times da Premier League</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>⚽ Maiores Times da Premier League</h1>
<p class="subtitle">Projeto feito por Kauã Teles e Lucas Gabriel</p>

<div class="times-area">

<img id="TimesImage" src="" alt="Escudo do time">

<div id="breedName">
Clique no botão para ver um time
</div>

</div>

<div class="controls">
<button id="randomBtn">⚽ Time Aleatório</button>
</div>

<div class="search">

<input
type="text"
id="breedInput"
placeholder="Digite um time (ex: arsenal, chelsea...)"
>

<button id="searchBtn">🔍 Buscar</button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
